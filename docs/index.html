<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CHI AI Cal">
<meta name="theme-color" content="#6366f1">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Chicago AI/STEM Calendar</title>
<style>
:root {
  --bg: #0a0a0f;
  --surface: #141420;
  --surface2: #1e1e2e;
  --border: #2a2a3a;
  --text: #e4e4ef;
  --text2: #9393a8;
  --accent: #6366f1;
  --accent2: #818cf8;
  --green: #22c55e;
  --red: #ef4444;
  --yellow: #eab308;
  --radius: 14px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
  padding-top: var(--safe-top);
  padding-bottom: var(--safe-bottom);
}

/* Header */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(10, 10, 15, 0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 12px 20px 8px;
}

.header-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}

.header h1 {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.5px;
}

.header h1 span { color: var(--accent2); }

.notif-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
}
.notif-btn:active { transform: scale(0.95); }
.notif-btn.enabled { background: var(--accent); border-color: var(--accent); }

/* Date strip */
.date-strip {
  display: flex;
  gap: 4px;
  overflow-x: auto;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
  padding: 4px 0 8px;
}
.date-strip::-webkit-scrollbar { display: none; }

.date-pill {
  flex: 0 0 auto;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 8px 14px;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.2s;
  min-width: 52px;
  background: transparent;
  border: none;
  color: var(--text2);
  font-family: inherit;
}
.date-pill .dow { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.date-pill .dom { font-size: 18px; font-weight: 700; margin-top: 2px; }
.date-pill .dot { width: 5px; height: 5px; border-radius: 50%; margin-top: 4px; background: transparent; }
.date-pill.has-events .dot { background: var(--accent); }
.date-pill.active { background: var(--accent); color: white; }
.date-pill.active .dot { background: white; }
.date-pill.today:not(.active) { color: var(--accent2); }

/* Tab bar */
.tabs {
  display: flex;
  gap: 0;
  background: var(--surface);
  border-radius: 10px;
  padding: 3px;
  margin: 0 20px 16px;
}
.tab {
  flex: 1;
  padding: 8px;
  border: none;
  background: none;
  color: var(--text2);
  font-size: 13px;
  font-weight: 600;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
}
.tab.active { background: var(--accent); color: white; }

/* Content area */
.content {
  padding: 0 20px 100px;
}

.section-label {
  font-size: 13px;
  font-weight: 600;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin: 20px 0 10px;
}

.day-summary {
  text-align: center;
  padding: 12px 0 4px;
  font-size: 15px;
  color: var(--text2);
}
.day-summary strong { color: var(--text); }

/* Event card */
.event-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 10px;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}
.event-card::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 3px;
  background: var(--accent);
  border-radius: 0 2px 2px 0;
}
.event-card.tier-essential::before { background: #a78bfa; width: 4px; }
.event-card.tier-strong::before { background: var(--accent2); }
.event-card.tier-moderate::before { background: var(--yellow); }
.event-card.tier-tangential::before { background: var(--text2); }
.event-card.tier-low::before { background: #444; }

.relevance-score {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 6px;
  letter-spacing: 0.3px;
}
.score-essential { background: rgba(167,139,250,0.2); color: #a78bfa; }
.score-strong { background: rgba(129,140,248,0.2); color: #818cf8; }
.score-moderate { background: rgba(234,179,8,0.15); color: #eab308; }
.score-tangential { background: rgba(147,147,168,0.15); color: #9393a8; }
.score-low { background: rgba(68,68,68,0.2); color: #666; }

/* Filter bar */
.filter-bar {
  display: flex;
  gap: 6px;
  padding: 0 20px 12px;
  overflow-x: auto;
  scrollbar-width: none;
}
.filter-bar::-webkit-scrollbar { display: none; }
.filter-chip {
  flex: 0 0 auto;
  padding: 5px 12px;
  border-radius: 16px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text2);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
}
.filter-chip.active { background: var(--accent); color: white; border-color: var(--accent); }
.filter-chip .chip-count { opacity: 0.7; margin-left: 3px; }

.event-card.accepted { border-color: var(--green); }
.event-card.accepted::before { background: var(--green); }
.event-card.declined { opacity: 0.4; }
.event-card.declined::before { background: var(--red); }

.event-time {
  font-size: 13px;
  font-weight: 700;
  color: var(--accent2);
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.event-badge {
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 4px;
  background: var(--surface2);
  color: var(--text2);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}

.event-name {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 6px;
  line-height: 1.3;
}

.event-location {
  font-size: 13px;
  color: var(--text2);
  margin-bottom: 4px;
}

.event-desc {
  font-size: 13px;
  color: var(--text2);
  line-height: 1.4;
  margin-bottom: 10px;
}

.event-link {
  color: var(--accent2);
  text-decoration: none;
  font-size: 13px;
  font-weight: 500;
}

.event-actions {
  display: flex;
  gap: 8px;
  margin-top: 12px;
}
.event-actions button {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.event-actions button:active { transform: scale(0.96); }
.btn-accept { color: var(--green) !important; }
.btn-accept.selected { background: var(--green) !important; color: white !important; border-color: var(--green) !important; }
.btn-decline { color: var(--red) !important; }
.btn-decline.selected { background: var(--red) !important; color: white !important; border-color: var(--red) !important; }

/* Empty state */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--text2);
}
.empty-state .emoji { font-size: 40px; margin-bottom: 12px; }
.empty-state p { font-size: 14px; line-height: 1.5; }
.empty-state a { color: var(--accent2); text-decoration: none; }

/* Stats bar */
.stats {
  display: flex;
  gap: 12px;
  margin: 12px 0;
}
.stat {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px;
  text-align: center;
}
.stat .num { font-size: 24px; font-weight: 700; color: var(--accent2); }
.stat .label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

/* Week view */
.week-list .week-day {
  margin-bottom: 16px;
}
.week-day-header {
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.week-day-header .count {
  font-size: 12px;
  background: var(--accent);
  color: white;
  padding: 2px 8px;
  border-radius: 10px;
  font-weight: 600;
}
.week-event-mini {
  padding: 10px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 6px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: pointer;
  transition: all 0.2s;
}
.week-event-mini:active { transform: scale(0.98); }
.week-event-mini .time { font-size: 12px; color: var(--accent2); font-weight: 600; }
.week-event-mini .name { font-size: 14px; font-weight: 500; margin-top: 2px; }
.week-event-mini .status-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  border: 2px solid var(--border);
  flex-shrink: 0;
}
.week-event-mini .status-dot.accepted { background: var(--green); border-color: var(--green); }
.week-event-mini .status-dot.declined { background: var(--red); border-color: var(--red); }

/* Resources section */
.resources { margin-top: 24px; }
.resource-link {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 6px;
  text-decoration: none;
  color: var(--text);
  transition: all 0.2s;
}
.resource-link:active { transform: scale(0.98); }
.resource-link .r-icon { font-size: 20px; }
.resource-link .r-name { font-size: 14px; font-weight: 500; }
.resource-link .r-desc { font-size: 12px; color: var(--text2); }
.resource-link .r-arrow { color: var(--text2); margin-left: auto; }

/* Refresh toast */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--accent);
  color: white;
  padding: 12px 24px;
  border-radius: 24px;
  font-size: 14px;
  font-weight: 600;
  box-shadow: 0 8px 32px rgba(99, 102, 241, 0.4);
  transition: transform 0.3s ease;
  z-index: 200;
}
.toast.show { transform: translateX(-50%) translateY(0); }

@media (prefers-color-scheme: light) {
  :root {
    --bg: #f5f5f7;
    --surface: #ffffff;
    --surface2: #f0f0f5;
    --border: #e0e0e8;
    --text: #1a1a2e;
    --text2: #6b6b80;
  }
  .header { background: rgba(245, 245, 247, 0.85); }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <h1>CHI <span>AI</span> Cal</h1>
    <button class="notif-btn" id="notifBtn" onclick="toggleNotifications()">Notifications</button>
  </div>
  <div class="date-strip" id="dateStrip"></div>
</div>

<div class="tabs">
  <button class="tab active" onclick="setView('day', this)">Today</button>
  <button class="tab" onclick="setView('week', this)">Week</button>
  <button class="tab" onclick="setView('links', this)">Links</button>
</div>

<div class="filter-bar" id="filterBar">
  <button class="filter-chip active" onclick="setFilter('all', this)">All</button>
  <button class="filter-chip" onclick="setFilter('essential', this)">Essential</button>
  <button class="filter-chip" onclick="setFilter('strong', this)">Strong</button>
  <button class="filter-chip" onclick="setFilter('moderate', this)">Moderate</button>
  <button class="filter-chip" onclick="setFilter('research', this)">Research 60+</button>
</div>

<div class="content" id="content"></div>
<div class="toast" id="toast"></div>

<script src="events.js"></script>
<script>
// ── State ──
const DAY_MAP = { Sunday:0, Monday:1, Tuesday:2, Wednesday:3, Thursday:4, Friday:5, Saturday:6 };
const DAY_NAMES = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
let selectedDate = new Date();
selectedDate.setHours(0,0,0,0);
let currentView = 'day';
let currentFilter = 'all';

// ── LocalStorage ──
function getDecisions() {
  try { return JSON.parse(localStorage.getItem('chi-ai-decisions') || '{}'); }
  catch { return {}; }
}
function setDecision(dateKey, eventId, status) {
  const d = getDecisions();
  if (!d[dateKey]) d[dateKey] = {};
  if (d[dateKey][eventId] === status) {
    delete d[dateKey][eventId];
  } else {
    d[dateKey][eventId] = status;
  }
  localStorage.setItem('chi-ai-decisions', JSON.stringify(d));
  render();
}
function getDecision(dateKey, eventId) {
  const d = getDecisions();
  return d[dateKey]?.[eventId] || null;
}

// ── Date helpers ──
function dateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function nthWeekdayOfMonth(year, month, weekday, n) {
  if (n === -1) {
    const last = new Date(year, month + 1, 0);
    const diff = (last.getDay() - weekday + 7) % 7;
    return new Date(year, month, last.getDate() - diff);
  }
  const first = new Date(year, month, 1);
  let dayDiff = (weekday - first.getDay() + 7) % 7;
  return new Date(year, month, 1 + dayDiff + (n - 1) * 7);
}
function formatTime(t) {
  let [h, m] = t.split(':').map(Number);
  const p = h >= 12 ? 'PM' : 'AM';
  h = h > 12 ? h - 12 : (h === 0 ? 12 : h);
  return `${h}:${String(m).padStart(2,'0')} ${p}`;
}

// ── Event resolution ──
function getEventsForDate(d) {
  const dayName = DAY_NAMES[d.getDay()];
  const found = [];

  // Weekly
  for (const ev of EVENTS.recurring_weekly) {
    if (ev.day === dayName) {
      found.push({ ...ev, type: 'weekly' });
    }
  }

  // Monthly
  for (const ev of EVENTS.recurring_monthly) {
    if (ev.day === dayName) {
      const weekday = DAY_MAP[ev.day];
      try {
        const expected = nthWeekdayOfMonth(d.getFullYear(), d.getMonth(), weekday, ev.week);
        if (expected.getDate() === d.getDate()) {
          found.push({ ...ev, type: 'monthly' });
        }
      } catch {}
    }
  }

  // Seasonal
  for (const ev of EVENTS.recurring_quarterly_seasonal) {
    if (ev.day === dayName) {
      for (const period of ev.active_periods || []) {
        const [s, e] = period.split('/');
        const ps = new Date(s + 'T00:00:00');
        const pe = new Date(e + 'T23:59:59');
        if (d >= ps && d <= pe) {
          found.push({ ...ev, type: 'seasonal' });
          break;
        }
      }
    }
  }

  // Specific dates
  const dk = dateKey(d);
  for (const ev of EVENTS.specific_dates) {
    if (ev.date === dk) {
      found.push({ ...ev, type: 'special', priority: 'high' });
    }
  }

  found.sort((a, b) => a.time.localeCompare(b.time));
  return found;
}

// ── Date strip ──
function buildDateStrip() {
  const strip = document.getElementById('dateStrip');
  strip.innerHTML = '';
  const today = new Date(); today.setHours(0,0,0,0);

  for (let i = -2; i < 12; i++) {
    const d = new Date(today);
    d.setDate(d.getDate() + i);
    const evts = getEventsForDate(d);
    const isToday = d.getTime() === today.getTime();
    const isActive = d.getTime() === selectedDate.getTime();

    const pill = document.createElement('button');
    pill.className = `date-pill${isActive ? ' active' : ''}${isToday ? ' today' : ''}${evts.length ? ' has-events' : ''}`;
    pill.innerHTML = `
      <span class="dow">${DAY_NAMES[d.getDay()].slice(0,3)}</span>
      <span class="dom">${d.getDate()}</span>
      <span class="dot"></span>
    `;
    const dd = new Date(d);
    pill.onclick = () => { selectedDate = dd; buildDateStrip(); render(); };
    strip.appendChild(pill);
  }

  // Scroll active into view
  requestAnimationFrame(() => {
    const active = strip.querySelector('.active');
    if (active) active.scrollIntoView({ inline: 'center', behavior: 'smooth' });
  });
}

// ── Render ──
function render() {
  const el = document.getElementById('content');
  if (currentView === 'day') renderDay(el);
  else if (currentView === 'week') renderWeek(el);
  else renderLinks(el);
}

function renderDay(el) {
  const allEvents = getEventsForDate(selectedDate);
  const events = filterByRelevance(allEvents);
  const dk = dateKey(selectedDate);
  const today = new Date(); today.setHours(0,0,0,0);
  const isToday = selectedDate.getTime() === today.getTime();
  const dayLabel = isToday ? 'Today' : selectedDate.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });

  const decisions = getDecisions()[dk] || {};
  const accepted = Object.values(decisions).filter(v => v === 'accepted').length;
  const declined = Object.values(decisions).filter(v => v === 'declined').length;
  const filtered = allEvents.length - events.length;

  let html = '';

  html += `<div class="day-summary"><strong>${dayLabel}</strong> — ${events.length} event${events.length !== 1 ? 's' : ''}${filtered ? ` <span style="color:var(--text2)">(${filtered} filtered)</span>` : ''}</div>`;

  if (events.length > 1) {
    html += `<div class="stats">
      <div class="stat"><div class="num">${events.length}</div><div class="label">Showing</div></div>
      <div class="stat"><div class="num" style="color:var(--green)">${accepted}</div><div class="label">Going</div></div>
      <div class="stat"><div class="num" style="color:var(--red)">${declined}</div><div class="label">Skip</div></div>
    </div>`;
  }

  if (events.length === 0 && allEvents.length > 0) {
    html += `<div class="empty-state">
      <div class="emoji">🔍</div>
      <p>${allEvents.length} events exist but none match your filter.<br>
      Try "All" to see everything.</p>
    </div>`;
  } else if (events.length === 0) {
    html += `<div class="empty-state">
      <div class="emoji">📭</div>
      <p>No scheduled events.<br><br>
      Check <a href="https://1871.com/events/" target="_blank">1871 Events</a> or
      <a href="https://www.meetup.com/find/us--il--chicago/ai/" target="_blank">Meetup Chicago AI</a>
      for pop-up events.<br><br>
      Great day for study prep or reading papers!</p>
    </div>`;
  } else {
    // Sort by relevance score (highest first), then by time
    const sorted = [...events].sort((a, b) => {
      const sa = a.relevance || 0, sb = b.relevance || 0;
      if (sb !== sa) return sb - sa;
      return a.time.localeCompare(b.time);
    });

    for (const ev of sorted) {
      const decision = getDecision(dk, ev.id);
      const cardClass = decision === 'accepted' ? ' accepted' : decision === 'declined' ? ' declined' : '';
      const tier = ev.tier || 'moderate';
      const typeLabel = { weekly: '', monthly: 'Monthly', seasonal: 'Seasonal', special: 'Special' }[ev.type] || '';

      html += `<div class="event-card tier-${tier}${cardClass}">
        <div class="event-time">
          ${formatTime(ev.time)}
          ${scoreLabel(ev)}
          ${typeLabel ? `<span class="event-badge">${typeLabel}</span>` : ''}
        </div>
        <div class="event-name">${ev.name}</div>
        ${ev.location ? `<div class="event-location">📍 ${ev.location}</div>` : ''}
        ${ev.description ? `<div class="event-desc">${ev.description}</div>` : ''}
        ${ev.url ? `<a class="event-link" href="${ev.url}" target="_blank">More info →</a>` : ''}
        <div class="event-actions">
          <button class="btn-accept${decision === 'accepted' ? ' selected' : ''}" onclick="setDecision('${dk}','${ev.id}','accepted')">✓ Going</button>
          <button class="btn-decline${decision === 'declined' ? ' selected' : ''}" onclick="setDecision('${dk}','${ev.id}','declined')">✕ Skip</button>
        </div>
      </div>`;
    }
  }

  el.innerHTML = html;
}

function renderWeek(el) {
  const today = new Date(); today.setHours(0,0,0,0);
  const monday = new Date(selectedDate);
  const dayOfWeek = monday.getDay();
  monday.setDate(monday.getDate() - ((dayOfWeek + 6) % 7));

  let html = '<div class="week-list">';
  let totalEvents = 0;

  for (let i = 0; i < 7; i++) {
    const d = new Date(monday);
    d.setDate(d.getDate() + i);
    const allEvents = getEventsForDate(d);
    const events = filterByRelevance(allEvents);
    const dk = dateKey(d);
    const isToday = d.getTime() === today.getTime();
    totalEvents += events.length;

    // Sort by relevance
    events.sort((a, b) => (b.relevance || 0) - (a.relevance || 0));

    html += `<div class="week-day">
      <div class="week-day-header" style="${isToday ? 'color:var(--accent2)' : ''}">
        ${DAY_NAMES[d.getDay()]}, ${MONTH_NAMES[d.getMonth()]} ${d.getDate()}
        ${isToday ? '<span class="event-badge" style="background:var(--accent);color:white">TODAY</span>' : ''}
        ${events.length ? `<span class="count">${events.length}</span>` : ''}
      </div>`;

    if (events.length === 0) {
      html += `<div class="week-event-mini" style="opacity:0.4;cursor:default">
        <div><div class="time" style="color:var(--text2)">—</div><div class="name" style="color:var(--text2)">${allEvents.length ? 'Filtered out' : 'Free day'}</div></div>
      </div>`;
    } else {
      for (const ev of events) {
        const decision = getDecision(dk, ev.id);
        const dotClass = decision ? ` ${decision}` : '';
        const score = ev.relevance || 0;
        const scoreColor = score >= 80 ? '#a78bfa' : score >= 60 ? '#818cf8' : score >= 40 ? '#eab308' : '#666';
        html += `<div class="week-event-mini" onclick="selectedDate=new Date('${d.toISOString()}');selectedDate.setHours(0,0,0,0);setView('day',document.querySelector('.tab'))">
          <div>
            <div class="time">${formatTime(ev.time)} <span style="color:${scoreColor};font-size:10px;font-weight:700">${score}</span></div>
            <div class="name">${ev.name}</div>
          </div>
          <div class="status-dot${dotClass}"></div>
        </div>`;
      }
    }
    html += '</div>';
  }

  html += '</div>';
  html += `<div class="day-summary" style="margin-top:16px"><strong>${totalEvents} events</strong> this week (filtered)</div>`;
  el.innerHTML = html;
}

function renderLinks(el) {
  const links = [
    { icon: '🏛️', name: 'TTIC Calendar', desc: 'All TTIC talks & seminars', url: 'https://www.ttic.edu/calendar/' },
    { icon: '🎓', name: 'UChicago CS Events', desc: 'CS department events', url: 'https://computerscience.uchicago.edu/news-events/events/' },
    { icon: '🔬', name: 'UChicago DSI Events', desc: 'Data Science Institute', url: 'https://datascience.uchicago.edu/events/dsi-events/' },
    { icon: '🧬', name: 'Northwestern NICO', desc: 'Complex systems seminars', url: 'https://www.nico.northwestern.edu/news-events/seminars.html' },
    { icon: '⚛️', name: 'Fermilab Events', desc: 'Public lectures & colloquia', url: 'https://events.fnal.gov/' },
    { icon: '🔋', name: 'Argonne Events', desc: 'National lab seminars', url: 'https://www.anl.gov/events' },
    { icon: '🤖', name: 'AI Tinkerers Chicago', desc: 'Monthly builder meetup', url: 'https://chicago.aitinkerers.org/' },
    { icon: '🐍', name: 'ChiPy', desc: 'Chicago Python User Group', url: 'https://www.chipy.org/' },
    { icon: '📊', name: 'Meetup - Chicago AI', desc: 'All Chicago AI meetups', url: 'https://www.meetup.com/find/us--il--chicago/ai/' },
    { icon: '🏢', name: '1871 Events', desc: 'Startup hub, 1000+ events/yr', url: 'https://1871.com/events/' },
    { icon: '📱', name: 'CHI IRL', desc: 'Weekly text digest — text "hi" to (312) 847-2515', url: 'https://chiirl.com' },
    { icon: '🌐', name: 'Chicago Tech Events', desc: 'Conference listings', url: 'https://chicagotechevents.com/' },
  ];

  let html = '<div class="section-label">Quick Links & Calendars</div><div class="resources">';
  for (const l of links) {
    html += `<a class="resource-link" href="${l.url}" target="_blank">
      <span class="r-icon">${l.icon}</span>
      <div><div class="r-name">${l.name}</div><div class="r-desc">${l.desc}</div></div>
      <span class="r-arrow">›</span>
    </a>`;
  }
  html += '</div>';
  el.innerHTML = html;
}

function setView(view, tabEl) {
  currentView = view;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  tabEl.classList.add('active');
  // Show/hide filter bar based on view
  document.getElementById('filterBar').style.display = (view === 'links') ? 'none' : 'flex';
  render();
}

function setFilter(filter, chipEl) {
  currentFilter = filter;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  chipEl.classList.add('active');
  render();
}

function filterByRelevance(events) {
  if (currentFilter === 'all') return events;
  if (currentFilter === 'research') return events.filter(e => (e.relevance || 0) >= 60);
  return events.filter(e => (e.tier || 'moderate') === currentFilter);
}

function scoreLabel(ev) {
  const score = ev.relevance || 0;
  const tier = ev.tier || 'moderate';
  const labels = {
    essential: 'PhD Essential',
    strong: 'Research Strong',
    moderate: 'Moderate',
    tangential: 'Tangential',
    low: 'Low'
  };
  return `<span class="relevance-score score-${tier}">${score} — ${labels[tier] || tier}</span>`;
}

// ── Notifications ──
async function toggleNotifications() {
  if (!('Notification' in window)) {
    showToast('Notifications not supported');
    return;
  }
  if (Notification.permission === 'granted') {
    showToast('Notifications already enabled!');
    document.getElementById('notifBtn').classList.add('enabled');
    scheduleDailyNotification();
    return;
  }
  const perm = await Notification.requestPermission();
  if (perm === 'granted') {
    document.getElementById('notifBtn').classList.add('enabled');
    showToast('Notifications enabled!');
    scheduleDailyNotification();
  } else {
    showToast('Permission denied');
  }
}

function scheduleDailyNotification() {
  // Check every 30 min if we should notify
  setInterval(() => {
    const now = new Date();
    if (now.getHours() === 7 && now.getMinutes() >= 45 && now.getMinutes() < 75) {
      const events = getEventsForDate(now);
      if (events.length > 0) {
        new Notification(`📅 ${events.length} events today`, {
          body: events.map(e => `${formatTime(e.time)} — ${e.name}`).join('\n'),
          icon: 'icons/icon-192.png'
        });
      }
    }
  }, 30 * 60 * 1000);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── Init ──
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

if (Notification.permission === 'granted') {
  document.getElementById('notifBtn').classList.add('enabled');
  scheduleDailyNotification();
}

buildDateStrip();
render();
</script>
